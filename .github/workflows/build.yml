name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Kodu indir
      uses: actions/checkout@v4

    - name: Python kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Bağımlılıkları kur
      run: |
        pip install PyQt5==5.15.11
        pip install pyinstaller

    - name: EXE üret
      run: |
        pyinstaller --onefile --windowed --name "AmiraldBatti" --paths client client/main.py

    - name: EXE'yi kaydet
      uses: actions/upload-artifact@v4
      with:
        name: AmiraldBatti-Windows
        path: dist/AmiraldBatti.exe